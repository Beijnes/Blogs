title: "Roel’s Docs & Blog"
description: "Technical documentation and blog posts"
remote_theme: just-the-docs/just-the-docs

search_enabled: true
# Default color scheme
color_scheme: dark

# Enable dark/light toggle
just_the_docs:
  color_scheme: auto
# Navigation order for top-level sections
nav_order: 1

# Collections for blog posts
collections:
  blog:
    output: true
    permalink: /blog/:path/

just_the_docs:
  collections:
    blog:
      name: Blog
      nav_order: 2
